<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goals & Achievements</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .goals-page { min-height:100vh; background:url('bg.gif') center/contain no-repeat; background-color:#1a1a2e; display:flex; flex-direction:column; align-items:center; }
        .goals-header { text-align:center; padding:10px 20px 20px; }
        .goals-icon { font-size:4.5rem; display:block; animation:bigBounce 2s ease-in-out infinite; margin-bottom:8px; }
        .goals-title { font-size:2.6rem; color:white; text-shadow:4px 4px 0 rgba(0,0,0,.5),-2px -2px 0 rgba(0,0,0,.28); letter-spacing:2px; }
        .goals-sub { font-family:'Nunito',sans-serif; font-size:.95rem; color:rgba(255,255,255,.8); font-weight:700; margin-top:6px; }
        .goals-section { width:100%; max-width:720px; padding:10px 25px 60px; display:flex; flex-direction:column; gap:20px; }

        .goals-box {
            background:rgba(255,254,242,.6);
            backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
            border:5px solid #222; border-radius:30px;
            box-shadow:8px 8px 0 #222; padding:28px 30px;
            animation:notePop .4s cubic-bezier(.175,.885,.32,1.275) both;
        }

        .box-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:16px; border-bottom:3px dashed #ddd; }
        .box-title { font-family:'Fredoka One',cursive; font-size:1.6rem; color:#333; }
        .box-count { font-family:'Nunito',sans-serif; font-size:.82rem; font-weight:900; color:#a78bfa; }

        /* Who toggle */
        .who-toggle { display:flex; gap:10px; margin-bottom:18px; }
        .who-btn { font-family:'Fredoka One',cursive; font-size:.95rem; padding:7px 20px; border-radius:50px; border:3px solid #ddd; background:transparent; color:#aaa; cursor:pointer; transition:all .2s; }
        .who-btn.active-her  { background:linear-gradient(135deg,#f472b6,#db2777); border-color:#db2777; color:white; box-shadow:3px 3px 0 #222; }
        .who-btn.active-him  { background:linear-gradient(135deg,#667eea,#764ba2); border-color:#764ba2; color:white; box-shadow:3px 3px 0 #222; }
        .who-btn.active-both { background:linear-gradient(135deg,#fcd34d,#f59e0b); border-color:#d97706; color:white; box-shadow:3px 3px 0 #222; }

        /* Add form */
        .add-form { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:20px; }
        .goal-input {
            flex:1; min-width:160px; border:3px solid #ddd; border-radius:16px;
            padding:10px 14px; font-family:'Nunito',sans-serif; font-size:.95rem; font-weight:700;
            color:#333; outline:none; background:rgba(255,255,255,.8); transition:border-color .2s;
        }
        .goal-input:focus { border-color:#a78bfa; }
        .add-btn {
            font-family:'Fredoka One',cursive; font-size:.95rem; color:white;
            background:linear-gradient(135deg,#a78bfa,#7c3aed);
            border:3px solid #222; border-radius:50px; padding:10px 22px;
            cursor:pointer; box-shadow:3px 3px 0 #222; transition:all .2s; white-space:nowrap;
        }
        .add-btn:hover { transform:translateY(-2px); box-shadow:4px 5px 0 #222; }
        .add-btn:active { transform:translateY(1px); box-shadow:1px 1px 0 #222; }

        /* Goal items */
        .goal-item {
            display:flex; align-items:flex-start; gap:12px;
            padding:14px 8px; border-bottom:2px solid rgba(200,200,200,.3);
            transition:opacity .3s;
        }
        .goal-item:last-child { border-bottom:none; }
        .goal-item.done { opacity:.55; }

        .goal-check {
            width:28px; height:28px; border-radius:50%; border:3px solid #ddd;
            background:white; cursor:pointer; flex-shrink:0; margin-top:1px;
            display:flex; align-items:center; justify-content:center;
            font-size:1rem; transition:all .2s; box-shadow:2px 2px 0 #ddd;
        }
        .goal-check.done-check { background:#4ade80; border-color:#16a34a; box-shadow:2px 2px 0 #16a34a; }

        .goal-body { flex:1; }
        .goal-text {
            font-family:'Nunito',sans-serif; font-size:.97rem; font-weight:700; color:#444;
            line-height:1.5;
        }
        .goal-item.done .goal-text { text-decoration:line-through; color:#aaa; }
        .goal-meta { display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
        .goal-who-tag {
            font-family:'Fredoka One',cursive; font-size:.72rem; padding:2px 10px;
            border-radius:20px; border:2px solid;
        }
        .goal-who-tag.her  { background:rgba(244,114,182,.15); border-color:#f472b6; color:#db2777; }
        .goal-who-tag.him  { background:rgba(102,126,234,.15); border-color:#667eea; color:#4338ca; }
        .goal-who-tag.both { background:rgba(252,211,77,.2);   border-color:#f59e0b; color:#b45309; }
        .goal-date { font-family:'Nunito',sans-serif; font-size:.72rem; color:#bbb; font-weight:700; }

        .goal-del { background:transparent; border:none; cursor:pointer; font-size:.85rem; color:#ddd; padding:2px 5px; border-radius:6px; transition:color .2s; flex-shrink:0; }
        .goal-del:hover { color:#ff4444; }

        .empty-state { text-align:center; padding:28px 0; font-family:'Nunito',sans-serif; font-size:.95rem; color:#bbb; font-weight:700; }

        /* Achievements */
        .achievement-item {
            display:flex; align-items:flex-start; gap:12px;
            padding:14px 8px; border-bottom:2px solid rgba(200,200,200,.3);
        }
        .achievement-item:last-child { border-bottom:none; }
        .achievement-star { font-size:1.8rem; flex-shrink:0; }
        .achievement-body { flex:1; }
        .achievement-text { font-family:'Nunito',sans-serif; font-size:.97rem; font-weight:700; color:#444; line-height:1.5; }
        .achievement-meta { display:flex; align-items:center; gap:8px; margin-top:4px; flex-wrap:wrap; }
    </style>
</head>
<body class="goals-page">
    <div class="rainbow-bar"></div>
    <nav class="emotion-nav"><a href="index.html" class="back-btn">← Back</a></nav>

    <div class="goals-header">
        <span class="goals-icon">🎯</span>
        <h1 class="goals-title">Goals & Achievements</h1>
        <p class="goals-sub">dream it, do it, celebrate it 🌟</p>
    </div>

    <section class="goals-section">

        <!-- Goals box -->
        <div class="goals-box">
            <div class="box-top">
                <span class="box-title">🎯 goals</span>
                <span class="box-count" id="goalsCount">0 goals</span>
            </div>

            <div class="who-toggle">
                <button class="who-btn active-her" id="btnHer" onclick="selectWho('her')">her 🌸</button>
                <button class="who-btn" id="btnHim" onclick="selectWho('him')">him 💙</button>
                <button class="who-btn" id="btnBoth" onclick="selectWho('both')">both 💛</button>
            </div>

            <div class="add-form">
                <input class="goal-input" id="goalInput" type="text" placeholder="add a goal…" maxlength="150"
                    onkeydown="if(event.key==='Enter') addGoal()">
                <button class="add-btn" onclick="addGoal()">+ add goal</button>
            </div>

            <div id="goalsList"><div class="empty-state">no goals yet — dream big 🌠</div></div>
        </div>

        <!-- Achievements box -->
        <div class="goals-box" style="animation-delay:.1s;">
            <div class="box-top">
                <span class="box-title">🏆 achievements</span>
                <span class="box-count" id="achCount">0 achievements</span>
            </div>

            <div class="who-toggle">
                <button class="who-btn active-her" id="achBtnHer" onclick="selectAchWho('her')">her 🌸</button>
                <button class="who-btn" id="achBtnHim" onclick="selectAchWho('him')">him 💙</button>
                <button class="who-btn" id="achBtnBoth" onclick="selectAchWho('both')">both 💛</button>
            </div>

            <div class="add-form">
                <input class="goal-input" id="achInput" type="text" placeholder="add an achievement…" maxlength="150"
                    onkeydown="if(event.key==='Enter') addAchievement()">
                <button class="add-btn" onclick="addAchievement()" style="background:linear-gradient(135deg,#fcd34d,#f59e0b);border-color:#d97706;">+ add 🌟</button>
            </div>

            <div id="achList"><div class="empty-state">no achievements yet — you're doing great 💪</div></div>
        </div>

    </section>

    <script>
        let _db, _goals = [], _achievements = [];
        let _goalWho = 'her', _achWho = 'her';

        function selectWho(w) {
            _goalWho = w;
            ['her','him','both'].forEach(x => {
                const btn = document.getElementById('btn' + x.charAt(0).toUpperCase() + x.slice(1));
                btn.className = 'who-btn' + (x === w ? ' active-' + x : '');
            });
        }

        function selectAchWho(w) {
            _achWho = w;
            ['her','him','both'].forEach(x => {
                const btn = document.getElementById('achBtn' + x.charAt(0).toUpperCase() + x.slice(1));
                btn.className = 'who-btn' + (x === w ? ' active-' + x : '');
            });
        }

        (async () => {
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js');
            const { getDatabase, ref, set, onValue } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js');
            _db = getDatabase(initializeApp({
                apiKey: "AIzaSyBPMzMNVpGsHhouPGjlSREFgm5ijyhgj6M",
                authDomain: "foryara-cce24.firebaseapp.com",
                databaseURL: "https://foryara-cce24-default-rtdb.europe-west1.firebasedatabase.app",
                projectId: "foryara-cce24",
                storageBucket: "foryara-cce24.firebasestorage.app",
                messagingSenderId: "1051054844072",
                appId: "1:1051054844072:web:1dd1e21e810c93a04d3a9d"
            }));

            onValue(ref(_db, 'goals'), snap => {
                const val = snap.val();
                _goals = val ? Object.values(val).sort((a,b) => b.id - a.id) : [];
                renderGoals();
            });

            onValue(ref(_db, 'achievements'), snap => {
                const val = snap.val();
                _achievements = val ? Object.values(val).sort((a,b) => b.id - a.id) : [];
                renderAchievements();
            });

            addGoal = () => {
                const input = document.getElementById('goalInput');
                const text = input.value.trim();
                if (!text) { input.style.borderColor='#f87171'; setTimeout(()=>input.style.borderColor='',1000); return; }
                const id = Date.now();
                set(ref(_db, 'goals/' + id), { id, text, who: _goalWho, done: false, timestamp: id });
                input.value = '';
            };

            addAchievement = () => {
                const input = document.getElementById('achInput');
                const text = input.value.trim();
                if (!text) { input.style.borderColor='#f87171'; setTimeout(()=>input.style.borderColor='',1000); return; }
                const id = Date.now();
                set(ref(_db, 'achievements/' + id), { id, text, who: _achWho, timestamp: id });
                input.value = '';
            };

            toggleGoal = (id) => {
                const g = _goals.find(g => g.id === id);
                if (g) set(ref(_db, 'goals/' + id), { ...g, done: !g.done });
            };

            deleteGoal = (id) => {
                showConfirm('Delete this goal?', function() { set(ref(_db, 'goals/' + id), null); });
            };

            deleteAch = (id) => {
                showConfirm('Delete this achievement?', function() { set(ref(_db, 'achievements/' + id), null); });
            };
        })();

        let addGoal        = () => {};
        let addAchievement = () => {};
        let toggleGoal     = () => {};
        let deleteGoal     = () => {};
        let deleteAch      = () => {};

        const whoLabel = { her:'her 🌸', him:'him 💙', both:'both 💛' };
        const achEmojis = ['🌟','🏆','🥇','✨','🎉','💪','🙌','🔥','💫','🎊'];

        function renderGoals() {
            const el = document.getElementById('goalsList');
            const cnt = document.getElementById('goalsCount');
            cnt.textContent = _goals.length + (_goals.length === 1 ? ' goal' : ' goals');
            if (_goals.length === 0) { el.innerHTML = '<div class="empty-state">no goals yet — dream big 🌠</div>'; return; }
            el.innerHTML = _goals.map(g => `
                <div class="goal-item ${g.done ? 'done' : ''}">
                    <div class="goal-check ${g.done ? 'done-check' : ''}" onclick="toggleGoal(${g.id})">${g.done ? '✓' : ''}</div>
                    <div class="goal-body">
                        <div class="goal-text">${escHtml(g.text)}</div>
                        <div class="goal-meta">
                            <span class="goal-who-tag ${g.who}">${whoLabel[g.who]}</span>
                            <span class="goal-date">${fmtDate(g.timestamp)}</span>
                        </div>
                    </div>
                    <button class="goal-del" onclick="deleteGoal(${g.id})">✕</button>
                </div>`).join('');
        }

        function renderAchievements() {
            const el = document.getElementById('achList');
            const cnt = document.getElementById('achCount');
            cnt.textContent = _achievements.length + (_achievements.length === 1 ? ' achievement' : ' achievements');
            if (_achievements.length === 0) { el.innerHTML = '<div class="empty-state">no achievements yet — you\'re doing great 💪</div>'; return; }
            el.innerHTML = _achievements.map((a, i) => `
                <div class="achievement-item">
                    <span class="achievement-star">${achEmojis[i % achEmojis.length]}</span>
                    <div class="achievement-body">
                        <div class="achievement-text">${escHtml(a.text)}</div>
                        <div class="achievement-meta">
                            <span class="goal-who-tag ${a.who}">${whoLabel[a.who]}</span>
                            <span class="goal-date">${fmtDate(a.timestamp)}</span>
                        </div>
                    </div>
                    <button class="goal-del" onclick="deleteAch(${a.id})">✕</button>
                </div>`).join('');
        }

        function fmtDate(ts) {
            return new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
        }

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        renderGoals();
        renderAchievements();
    </script>
    <script src="toast.js"></script>
    <script src="nav.js"></script>
</body>
</html>
